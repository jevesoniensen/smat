services:
  smat-db:
    image: "postgres:15-alpine"
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: smat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d smat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared-network
    volumes:
      - db-data:/var/lib/postgresql/data/

  pg-admin:
    image: dpage/pgadmin4
    container_name: pg-admin
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@admin.com
      PGADMIN_DEFAULT_PASSWORD: postgres
    ports:
      - "15432:80"
    networks:
      - shared-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  kafka:
    image: apache/kafka:4.3.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # 1. THE KRAFT CORE CONFIGURATION
      - CLUSTER_ID=4L62YDgWQFCm6s9PthbCRw          # Explicitly triggers KRaft storage formatting
      - KAFKA_PROCESS_ROLES=broker,controller     # Tells the node to run KRaft broker + controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

      # 2. LISTENERS & NETWORKING
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER

      # 3. DEV CLUSTER OPTIMIZATIONS
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_LOG_MESSAGE_TIMESTAMP_AFTER_MAX_MS=31536000000
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - shared-network

  kafka-init:
    image: apache/kafka:4.3.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - shared-network
    volumes:
      - ./docker/init-kafka.sh:/usr/bin/init-kafka.sh
    entrypoint: [ "sh", "/usr/bin/init-kafka.sh" ]

  kafka-ui:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafka-ui
    ports:
      - "9000:9000"
    environment:
      - KAFKA_BROKERCONNECT=kafka:29092
    depends_on:
      - kafka
    networks:
      - shared-network

  connect:
    image: debezium/connect:2.7.3.Final
    container_name: connect
    ports:
      - "8083:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=smat.connect.configs
      - OFFSET_STORAGE_TOPIC=smat.connect.offsets
      - STATUS_STORAGE_TOPIC=smat.connect.status
      - CONFIG_STORAGE_REPLICATION_FACTOR=1
      - OFFSET_STORAGE_REPLICATION_FACTOR=1
      - STATUS_STORAGE_REPLICATION_FACTOR=1
      - KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      kafka:
        condition: service_healthy
      smat-db:
        condition: service_healthy
    networks:
      - shared-network

  debezium-init:
    image: curlimages/curl:latest
    container_name: debezium-init
    depends_on:
      connect:
        condition: service_healthy
    networks:
      - shared-network
    volumes:
      - ./docker/debezium-init:/init:ro
    working_dir: /init
    entrypoint: [ "sh", "/init/register-connector.sh" ]

networks:
  shared-network:
#    driver: bridge

volumes:
  db-data:
  pgadmin-data:
  kafka_data:
